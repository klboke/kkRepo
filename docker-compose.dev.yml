name: kkrepo-dev

services:
  mysql:
    image: mysql:8.0
    container_name: kkrepo-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kkrepo
      MYSQL_USER: kkrepo
      MYSQL_PASSWORD: kkrepo
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - ./.local/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgresql:
    image: postgres:16
    profiles:
      - postgresql
    environment:
      POSTGRES_DB: kkrepo
      POSTGRES_USER: kkrepo
      POSTGRES_PASSWORD: kkrepo
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - ./.local/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rustfs-perms:
    image: alpine:3.20
    user: root
    volumes:
      - ./.local/rustfs/data:/data
    command: ["sh", "-c", "chown -R 10001:10001 /data"]

  rustfs:
    image: rustfs/rustfs:latest
    container_name: kkrepo-rustfs
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_ACCESS_KEY: minioadmin
      RUSTFS_SECRET_KEY: minioadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.local/rustfs/data:/data
    command: ["/data"]
