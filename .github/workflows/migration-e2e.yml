name: Migration E2E

on:
  workflow_call:
    inputs:
      candidate_image_artifact:
        description: Prebuilt JVM candidate image artifact from this workflow run
        required: false
        default: ""
        type: string
      candidate_source_sha:
        description: Exact source SHA embedded in the candidate artifact
        required: false
        default: ""
        type: string
      artifact_prefix:
        description: Prefix used to keep artifacts unique across reusable workflow calls
        required: false
        default: migration
        type: string
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled

permissions:
  contents: read

concurrency:
  group: migration-e2e-${{ github.workflow }}-${{ github.ref }}-${{ inputs.artifact_prefix || 'direct' }}
  cancel-in-progress: true

jobs:
  build-candidate:
    name: Build JVM candidate once for direct Migration E2E runs
    if: >-
      inputs.candidate_image_artifact == '' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'run-migration-e2e') &&
          (
            !contains(github.event.pull_request.labels.*.name, 'run-full-e2e') ||
            (github.event.action == 'labeled' && github.event.label.name == 'run-migration-e2e')
          )
        )
      )
    uses: ./.github/workflows/build-e2e-candidate.yml
    with:
      runtime: jvm
      source_sha: ${{ github.sha }}
      artifact_key: ${{ github.event.pull_request.head.sha || github.sha }}

  nexus-migration-e2e:
    name: Nexus ${{ matrix.nexus-version }} (${{ matrix.metadata-engine }}) to ${{ matrix.target-database || 'mysql' }} migration E2E
    needs: build-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: >-
      always() &&
      !cancelled() &&
      (inputs.candidate_image_artifact != '' || needs.build-candidate.result == 'success') &&
      (
        inputs.candidate_image_artifact != '' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'run-migration-e2e') &&
          (
            !contains(github.event.pull_request.labels.*.name, 'run-full-e2e') ||
            (github.event.action == 'labeled' && github.event.label.name == 'run-migration-e2e')
          )
        )
      )
    strategy:
      fail-fast: false
      matrix:
        # These lanes represent Nexus persistence eras/content shapes, not every release.
        # Add a version only when its datastore or fingerprint changes; otherwise extend an
        # existing representative lane with the new repository-format fixture.
        include:
          - nexus-version: 3.29.2
            project-suffix: nexus-3292
            metadata-engine: orientdb
            expected-adapter: OrientDbNexusAdapter
            nexus-db-service: ""
            nexus-jvm-args: ""
            compose-profiles: ""
            nexus-port: 28090
            kkrepo-port: 18090
            management-port: 18091
            docker-port: 18183
            composer-migration-enabled: false
            swift-migration-enabled: false
            secondary-port: 19090
            secondary-management-port: 19091
            wait-timeout-seconds: 300
          - nexus-version: 3.77.2
            project-suffix: nexus-3772
            metadata-engine: datastore-h2
            expected-adapter: DatastoreH2NexusAdapter
            nexus-db-service: ""
            nexus-jvm-args: ""
            compose-profiles: ""
            nexus-port: 28092
            kkrepo-port: 18094
            management-port: 18095
            docker-port: 18185
            composer-migration-enabled: false
            swift-migration-enabled: false
            secondary-port: 19092
            secondary-management-port: 19093
            wait-timeout-seconds: 300
          - nexus-version: 3.77.2
            project-suffix: nexus-3772-pg
            metadata-engine: datastore-postgresql
            expected-adapter: DatastorePostgresqlNexusAdapter
            nexus-db-service: nexus-postgres
            nexus-jvm-args: "-Dnexus.datastore.enabled=true -Dnexus.datastore.nexus.jdbcUrl=jdbc:postgresql://nexus-postgres:5432/nexus?currentSchema=nexus -Dnexus.datastore.nexus.username=nexus -Dnexus.datastore.nexus.password=nexus"
            compose-profiles: nexus-postgres
            nexus-port: 28093
            kkrepo-port: 18096
            management-port: 18097
            docker-port: 18187
            composer-migration-enabled: false
            swift-migration-enabled: false
            secondary-port: 19094
            secondary-management-port: 19095
            wait-timeout-seconds: 300
          - nexus-version: 3.92.0
            project-suffix: nexus-3920-pg
            metadata-engine: datastore-postgresql
            expected-adapter: DatastorePostgresqlNexusAdapter
            nexus-db-service: nexus-postgres
            nexus-jvm-args: "-Dnexus.datastore.enabled=true -Dnexus.datastore.nexus.jdbcUrl=jdbc:postgresql://nexus-postgres:5432/nexus?currentSchema=nexus -Dnexus.datastore.nexus.username=nexus -Dnexus.datastore.nexus.password=nexus"
            compose-profiles: nexus-postgres
            nexus-port: 28094
            kkrepo-port: 18098
            management-port: 18099
            docker-port: 18189
            composer-migration-enabled: true
            swift-migration-enabled: false
            secondary-port: 19096
            secondary-management-port: 19097
            wait-timeout-seconds: 300
          - nexus-version: 3.94.0
            project-suffix: nexus-3940-pg-swift
            metadata-engine: datastore-postgresql
            expected-adapter: DatastorePostgresqlNexusAdapter
            nexus-db-service: nexus-postgres
            nexus-jvm-args: "-Dnexus.datastore.enabled=true -Dnexus.datastore.nexus.jdbcUrl=jdbc:postgresql://nexus-postgres:5432/nexus?currentSchema=nexus -Dnexus.datastore.nexus.username=nexus -Dnexus.datastore.nexus.password=nexus"
            compose-profiles: nexus-postgres,kkrepo-secondary
            nexus-port: 28095
            kkrepo-port: 18100
            management-port: 18101
            docker-port: 18191
            composer-migration-enabled: false
            swift-migration-enabled: true
            secondary-port: 18102
            secondary-management-port: 18103
            wait-timeout-seconds: 420
          - nexus-version: 3.94.0
            project-suffix: nexus-3940-h2-swift
            metadata-engine: datastore-h2
            expected-adapter: DatastoreH2NexusAdapter
            nexus-db-service: ""
            nexus-jvm-args: ""
            compose-profiles: kkrepo-secondary
            nexus-port: 28096
            kkrepo-port: 18104
            management-port: 18105
            docker-port: 18193
            composer-migration-enabled: false
            swift-migration-enabled: true
            secondary-port: 18106
            secondary-management-port: 18107
            wait-timeout-seconds: 420
          - nexus-version: 3.94.0
            project-suffix: nexus-3940-pg-swift-target-pg
            metadata-engine: datastore-postgresql
            expected-adapter: DatastorePostgresqlNexusAdapter
            nexus-db-service: nexus-postgres
            nexus-jvm-args: "-Dnexus.datastore.enabled=true -Dnexus.datastore.nexus.jdbcUrl=jdbc:postgresql://nexus-postgres:5432/nexus?currentSchema=nexus -Dnexus.datastore.nexus.username=nexus -Dnexus.datastore.nexus.password=nexus"
            compose-profiles: nexus-postgres,kkrepo-postgresql
            target-database: postgresql
            target-database-service: kkrepo-postgres
            candidate-service: kkrepo-postgresql
            secondary-service: kkrepo-postgresql-secondary
            nexus-port: 28097
            kkrepo-port: 18108
            management-port: 18109
            docker-port: 18195
            composer-migration-enabled: false
            swift-migration-enabled: true
            ansible-migration-enabled: true
            secondary-port: 18110
            secondary-management-port: 18111
            wait-timeout-seconds: 420
    env:
      COMPOSE_FILE: docker-compose.compat.yml
      COMPOSE_PROJECT_NAME: kkrepo-migration-${{ matrix.project-suffix }}
      COMPOSE_PROFILES: ${{ matrix.compose-profiles }}
      NEXUS_COMPAT_IMAGE: sonatype/nexus3:${{ matrix.nexus-version }}
      NEXUS_COMPAT_JVM_ARGS: ${{ matrix.nexus-jvm-args }}
      NEXUS_COMPAT_PORT: ${{ matrix.nexus-port }}
      NEXUS_COMPAT_BASE_URL: http://127.0.0.1:${{ matrix.nexus-port }}
      NEXUS_COMPAT_USERNAME: admin
      NEXUS_COMPAT_PASSWORD: "Admin1234"
      KKREPO_COMPAT_PORT: ${{ matrix.kkrepo-port }}
      KKREPO_MANAGEMENT_PORT: ${{ matrix.management-port }}
      KKREPO_COMPAT_BASE_URL: http://127.0.0.1:${{ matrix.kkrepo-port }}
      KKREPO_MANAGEMENT_URL: http://127.0.0.1:${{ matrix.management-port }}
      KKREPO_COMPAT_USERNAME: admin
      KKREPO_COMPAT_PASSWORD: "12345678"
      KKREPO_DOCKER_CONNECTOR_PORT: ${{ matrix.docker-port }}
      KKREPO_DOCKER_HOSTED_PORT: ${{ matrix.docker-port }}
      NEXUS_DOCKER_HTTP_PORT: ${{ matrix.docker-port }}
      DOCKER_MIGRATION_KKREPO_REGISTRY: 127.0.0.1:${{ matrix.docker-port }}
      DOCKER_MIGRATION_TAG: ${{ matrix.metadata-engine }}-${{ github.run_id }}-${{ github.run_attempt }}
      MIGRATION_E2E_EXPECTED_ADAPTER: ${{ matrix.expected-adapter }}
      COMPOSER_MIGRATION_ENABLED: ${{ matrix.composer-migration-enabled }}
      COMPOSER_NEXUS_REQUIRED: ${{ matrix.composer-migration-enabled }}
      SWIFT_MIGRATION_ENABLED: ${{ matrix.swift-migration-enabled }}
      ANSIBLE_MIGRATION_ENABLED: ${{ matrix.ansible-migration-enabled || false }}
      KKREPO_MIGRATION_TARGET_DATABASE: ${{ matrix.target-database || 'mysql' }}
      KKREPO_MIGRATION_TARGET_DATABASE_SERVICE: ${{ matrix.target-database-service || 'mysql' }}
      KKREPO_SECONDARY_COMPAT_PORT: ${{ matrix.secondary-port }}
      KKREPO_SECONDARY_MANAGEMENT_PORT: ${{ matrix.secondary-management-port }}
      KKREPO_MIGRATION_SECONDARY_URL: http://127.0.0.1:${{ matrix.secondary-port }}
      DOCKER_MIGRATION_WAIT_TIMEOUT_SECONDS: ${{ matrix.wait-timeout-seconds }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK 25
        if: matrix.nexus-version == '3.92.0'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Validate migration compose file
        run: docker compose -f "$COMPOSE_FILE" config

      - name: Load verified candidate image
        uses: ./.github/actions/load-e2e-candidate
        with:
          artifact_name: ${{ inputs.candidate_image_artifact || needs.build-candidate.outputs.image_artifact }}
          runtime: jvm
          source_sha: ${{ inputs.candidate_source_sha || github.sha }}

      - name: Start databases
        run: docker compose -f "$COMPOSE_FILE" up -d --wait ${{ matrix.target-database-service || 'mysql' }} ${{ matrix.nexus-db-service }}

      - name: Start Nexus ${{ matrix.nexus-version }} and candidate kkrepo
        run: docker compose -f "$COMPOSE_FILE" up -d nexus ${{ matrix.candidate-service || 'kkrepo' }}

      - name: Prepare migration fixtures
        run: scripts/ci/live-compat-setup.sh

      - name: Start shared-database migration read replica
        if: matrix.swift-migration-enabled
        run: docker compose -f "$COMPOSE_FILE" up -d ${{ matrix.secondary-service || 'kkrepo-secondary' }}

      - name: Set up Terraform current stable
        if: matrix.nexus-version == '3.92.0'
        shell: bash
        run: |
          set -euo pipefail
          version=1.15.8
          archive="terraform_${version}_linux_amd64.zip"
          mkdir -p "$RUNNER_TEMP/terraform/$version"
          curl -fsSLO "https://releases.hashicorp.com/terraform/${version}/${archive}"
          curl -fsSLO "https://releases.hashicorp.com/terraform/${version}/terraform_${version}_SHA256SUMS"
          grep " ${archive}$" "terraform_${version}_SHA256SUMS" | sha256sum -c -
          unzip -q "$archive" -d "$RUNNER_TEMP/terraform/$version"
          echo "TERRAFORM_CURRENT_BIN=$RUNNER_TEMP/terraform/$version/terraform" >> "$GITHUB_ENV"

      - name: Set up Ansible Galaxy client for migration acceptance
        if: matrix.ansible-migration-enabled
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/ansible-migration"
          "$RUNNER_TEMP/ansible-migration/bin/python" -m pip install --upgrade pip ansible-core
          echo "ANSIBLE_GALAXY_BIN=$RUNNER_TEMP/ansible-migration/bin/ansible-galaxy" >> "$GITHUB_ENV"

      - name: Prepare Nexus Terraform migration fixture
        if: matrix.nexus-version == '3.92.0'
        run: >-
          mvn -B -ntp -pl compat-test -am
          -Dtest=TerraformRepositoryBlackBoxCompatibilityTest#preparesNexusHostedMigrationFixtureWhenConfigured
          -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Run Nexus metadata and repository-data migration E2E
        run: scripts/docker-compat/migration-e2e.sh

      - name: Collect migration logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -f "$COMPOSE_FILE" ps > "artifacts/migration-e2e-${{ matrix.nexus-version }}-${{ matrix.metadata-engine }}-ps.txt" || true
          docker compose -f "$COMPOSE_FILE" logs --no-color --timestamps > "artifacts/migration-e2e-${{ matrix.nexus-version }}-${{ matrix.metadata-engine }}-compose.log" || true

      - name: Upload migration logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix || 'migration' }}-${{ matrix.project-suffix }}-logs
          path: artifacts/
          if-no-files-found: ignore

      - name: Stop services
        if: always()
        run: docker compose -f "$COMPOSE_FILE" down -v
