name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-protocol-tests:
    name: unit-and-protocol-tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate development compose file
        run: |
          docker compose -f docker-compose.dev.yml config
          docker compose -f docker-compose.dev.yml --profile postgresql config
          docker compose -f docker-compose.quickstart.yml config
          docker compose -f docker-compose.quickstart-postgresql.yml config

      - name: Run server tests
        run: mvn -B -ntp -pl server -am -Dsurefire.failIfNoSpecifiedTests=false verify

      - name: Run non-live compatibility tests
        run: mvn -B -ntp -pl compat-test -am -Dtest=MavenMetadataMergeCompatibilityTest,MavenWritePolicyCompatibilityTest,NpmProtocolCompatibilityTest -Dsurefire.failIfNoSpecifiedTests=false verify

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: .
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  persistence-package-boundary:
    name: persistence-package-boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - run: mvn -B -ntp -pl server -am -Dtest=PersistencePackageBoundaryTest -Dsurefire.failIfNoSpecifiedTests=false test

  persistence-contract:
    name: persistence-contract (${{ matrix.database }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - database: mysql
            module: persistence-mysql
            test: MySqlPersistenceApiContractTest
          - database: postgresql
            module: persistence-postgresql
            test: PostgreSqlPersistenceApiContractTest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - run: mvn -B -ntp -pl ${{ matrix.module }} -am -Dtest=${{ matrix.test }} -Dsurefire.failIfNoSpecifiedTests=false test

  server-smoke:
    name: server-smoke (${{ matrix.database }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - database: mysql
            method: mysqlSupportsFreshAndRepeatStartupWithCrossNodeSession
          - database: postgresql
            method: postgresqlSupportsFreshAndRepeatStartupWithCrossNodeSession
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - run: mvn -B -ntp -pl server -am -Dtest=DatabaseServerSmokeTest#${{ matrix.method }} -Dsurefire.failIfNoSpecifiedTests=false test

  mysql-v29-upgrade-compatibility:
    name: mysql-v29-upgrade-compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - run: mvn -B -ntp -pl persistence-mysql -am -Dtest=MySqlV29MigrationCompatibilityTest -Dsurefire.failIfNoSpecifiedTests=false test

  flyway-version-parity:
    name: flyway-version-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify migration and deployment contracts
        run: |
          scripts/ci/check-flyway-parity.sh
          docker compose -f docker-compose.quickstart.yml config
          docker compose -f docker-compose.quickstart-postgresql.yml config
          docker compose -f docker-compose.compat-postgres.yml --profile kkrepo-postgresql config
      - uses: azure/setup-helm@v5
      - run: helm lint deploy/helm/kkrepo

  dev-jar-deploy-contract:
    name: dev-jar-deploy-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify dev jar deployment scripts
        run: |
          bash -n scripts/deploy/kkrepo-jar-deploy.sh
          bash -n scripts/ci/test-dev-jar-deploy.sh
          scripts/ci/test-dev-jar-deploy.sh
          test -f .github/deploy/dev/systemd/kkrepo.service
          POSTGRES_DB=kkrepo POSTGRES_USER=kkrepo POSTGRES_PASSWORD=kkrepo \
            docker compose -f .github/deploy/dev/docker-compose.yml config --quiet
