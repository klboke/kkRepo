name: Build E2E Candidate

on:
  workflow_call:
    inputs:
      runtime:
        description: Candidate runtime packaging
        required: true
        type: string
      source_sha:
        description: Exact source commit to build
        required: true
        type: string
      artifact_key:
        description: Full PR head SHA or commit SHA used in immutable artifact names
        required: true
        type: string
      include_server_artifact:
        description: Upload the executable JVM jar for cross-platform Swift jobs
        required: false
        default: false
        type: boolean
    outputs:
      image_artifact:
        description: Candidate Docker image artifact name
        value: ${{ jobs.build.outputs.image_artifact }}
      server_artifact:
        description: Executable JVM server artifact name, empty for Native
        value: ${{ jobs.build.outputs.server_artifact }}

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.runtime }} candidate once
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.runtime == 'native' && 90 || 45 }}
    outputs:
      image_artifact: ${{ steps.names.outputs.image_artifact }}
      server_artifact: ${{ steps.names.outputs.server_artifact }}
    steps:
      - name: Validate candidate identity
        id: names
        shell: bash
        env:
          CANDIDATE_RUNTIME: ${{ inputs.runtime }}
          CANDIDATE_SOURCE_SHA: ${{ inputs.source_sha }}
          CANDIDATE_ARTIFACT_KEY: ${{ inputs.artifact_key }}
          INCLUDE_SERVER_ARTIFACT: ${{ inputs.include_server_artifact }}
        run: |
          set -euo pipefail
          if [[ "$CANDIDATE_RUNTIME" != "jvm" && "$CANDIDATE_RUNTIME" != "native" ]]; then
            echo "runtime must be jvm or native" >&2
            exit 2
          fi
          if [[ ! "$CANDIDATE_SOURCE_SHA" =~ ^[0-9a-fA-F]{40,64}$ ]]; then
            echo "source_sha must be a full Git object ID" >&2
            exit 2
          fi
          if [[ ! "$CANDIDATE_ARTIFACT_KEY" =~ ^[0-9a-fA-F]{40,64}$ ]]; then
            echo "artifact_key must be a full Git object ID" >&2
            exit 2
          fi
          echo "image_artifact=kkrepo-e2e-${CANDIDATE_RUNTIME}-${CANDIDATE_ARTIFACT_KEY,,}" >> "$GITHUB_OUTPUT"
          if [[ "$CANDIDATE_RUNTIME" == "jvm" && "$INCLUDE_SERVER_ARTIFACT" == "true" ]]; then
            echo "server_artifact=kkrepo-e2e-server-${CANDIDATE_ARTIFACT_KEY,,}" >> "$GITHUB_OUTPUT"
          else
            echo "server_artifact=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out exact source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build JVM candidate image
        if: inputs.runtime == 'jvm'
        run: scripts/build-docker-image.sh kkrepo:compat

      - name: Build Native candidate image
        if: inputs.runtime == 'native'
        run: scripts/build-docker-image.sh --native kkrepo:compat

      - name: Package candidate image
        shell: bash
        env:
          CANDIDATE_RUNTIME: ${{ inputs.runtime }}
          CANDIDATE_SOURCE_SHA: ${{ inputs.source_sha }}
        run: >-
          scripts/ci/package-e2e-candidate-image.sh
          kkrepo:compat
          "$CANDIDATE_RUNTIME"
          "$CANDIDATE_SOURCE_SHA"
          "$RUNNER_TEMP/candidate-image"

      - name: Stage executable JVM server
        if: inputs.runtime == 'jvm' && inputs.include_server_artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/candidate-server"
          jar="$(find server/target -maxdepth 1 -name 'kkrepo-server-*.jar' -type f -print -quit)"
          test -n "$jar"
          cp "$jar" "$RUNNER_TEMP/candidate-server/kkrepo-server.jar"

      - name: Upload candidate image
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.names.outputs.image_artifact }}
          path: ${{ runner.temp }}/candidate-image/
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

      - name: Upload executable JVM server
        if: inputs.runtime == 'jvm' && inputs.include_server_artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.names.outputs.server_artifact }}
          path: ${{ runner.temp }}/candidate-server/kkrepo-server.jar
          if-no-files-found: error
          retention-days: 1
