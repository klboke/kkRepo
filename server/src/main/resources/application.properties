app.id=infra-kkrepo

server.port=8080
server.shutdown=graceful
server.tomcat.threads.max=${KKREPO_TOMCAT_THREADS_MAX:100}
server.tomcat.threads.min-spare=${KKREPO_TOMCAT_THREADS_MIN_SPARE:10}
server.tomcat.max-connections=${KKREPO_TOMCAT_MAX_CONNECTIONS:2000}
server.tomcat.accept-count=${KKREPO_TOMCAT_ACCEPT_COUNT:200}
server.tomcat.connection-timeout=${KKREPO_TOMCAT_CONNECTION_TIMEOUT:30s}
spring.mvc.async.request-timeout=10m
server.servlet.context-path=/
server.servlet.session.timeout=${KKREPO_SESSION_TIMEOUT:24h}
server.servlet.session.cookie.max-age=${KKREPO_SESSION_COOKIE_MAX_AGE:-1}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${KKREPO_SESSION_COOKIE_SECURE:false}

spring.application.name=kkrepo
spring.datasource.url=jdbc:mysql://127.0.0.1:13306/kkrepo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=kkrepo
spring.datasource.password=kkrepo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${KKREPO_HIKARI_MAXIMUM_POOL_SIZE:50}
spring.datasource.hikari.minimum-idle=${KKREPO_HIKARI_MINIMUM_IDLE:10}
spring.datasource.hikari.connection-timeout=${KKREPO_HIKARI_CONNECTION_TIMEOUT_MS:5000}
spring.datasource.hikari.idle-timeout=${KKREPO_HIKARI_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${KKREPO_HIKARI_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.leak-detection-threshold=${KKREPO_HIKARI_LEAK_DETECTION_THRESHOLD_MS:30000}
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.session.store-type=${KKREPO_SESSION_STORE_TYPE:jdbc}
spring.session.timeout=${KKREPO_SESSION_TIMEOUT:24h}
spring.session.jdbc.initialize-schema=never
spring.session.jdbc.table-name=SPRING_SESSION
spring.session.jdbc.flush-mode=on_save
spring.servlet.multipart.max-file-size=${KKREPO_MULTIPART_MAX_FILE_SIZE:1024MB}
spring.servlet.multipart.max-request-size=${KKREPO_MULTIPART_MAX_REQUEST_SIZE:1024MB}
spring.jackson.default-property-inclusion=non_null
spring.http.converters.preferred-json-mapper=jackson2
spring.jackson.time-zone=Asia/Shanghai
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.task.scheduling.pool.size=${KKREPO_TASK_SCHEDULING_POOL_SIZE:4}

management.server.port=${KKREPO_MANAGEMENT_PORT:8081}
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.metrics.tags.application=${spring.application.name}

kkrepo.compatibility.repository-url-prefix=/repository
kkrepo.repository.log-non-success-requests=${KKREPO_REPOSITORY_LOG_NON_SUCCESS_REQUESTS:true}
kkrepo.repository.log-non-success-request-excluded-statuses=${KKREPO_REPOSITORY_LOG_NON_SUCCESS_REQUEST_EXCLUDED_STATUSES:477,488}

kkrepo.cache.backend=${KKREPO_CACHE_BACKEND:memory}
kkrepo.cache.memory.maximum-size=${KKREPO_CACHE_MEMORY_MAXIMUM_SIZE:500000}
kkrepo.cache.version.local-ttl-seconds=${KKREPO_CACHE_VERSION_LOCAL_TTL_SECONDS:2}
kkrepo.cache.asset-metadata.enabled=${KKREPO_CACHE_ASSET_METADATA_ENABLED:true}
kkrepo.cache.asset-metadata.ttl-seconds=${KKREPO_CACHE_ASSET_METADATA_TTL_SECONDS:60}
kkrepo.cache.asset-metadata.missing-ttl-seconds=${KKREPO_CACHE_ASSET_METADATA_MISSING_TTL_SECONDS:5}
kkrepo.cache.repository-token.local-ttl-seconds=${KKREPO_CACHE_REPOSITORY_TOKEN_LOCAL_TTL_SECONDS:2}
kkrepo.cache.npm-group-packument.enabled=${KKREPO_CACHE_NPM_GROUP_PACKUMENT_ENABLED:true}
kkrepo.cache.pypi-group-simple-index.enabled=${KKREPO_CACHE_PYPI_GROUP_SIMPLE_INDEX_ENABLED:true}
kkrepo.cache.group-member-asset.enabled=${KKREPO_CACHE_GROUP_MEMBER_ASSET_ENABLED:true}
kkrepo.cache.group-member-asset.ttl-seconds=${KKREPO_CACHE_GROUP_MEMBER_ASSET_TTL_SECONDS:60}
# Short-TTL cache of Basic-auth results, keyed by HMAC(credentialSecret, user\0pass).
# Avoids recomputing 120k-round PBKDF2 on every request (the auth-path throughput bottleneck).
kkrepo.cache.basic-auth.enabled=${KKREPO_CACHE_BASIC_AUTH_ENABLED:true}
kkrepo.cache.basic-auth.ttl-seconds=${KKREPO_CACHE_BASIC_AUTH_TTL_SECONDS:120}
kkrepo.cache.basic-auth.missing-ttl-seconds=${KKREPO_CACHE_BASIC_AUTH_MISSING_TTL_SECONDS:5}
kkrepo.proxy.negative-cache.enabled=${KKREPO_PROXY_NEGATIVE_CACHE_ENABLED:${KKREPO_MAVEN_PROXY_NEGATIVE_CACHE_ENABLED:true}}
kkrepo.proxy.negative-cache.ttl-minutes=${KKREPO_PROXY_NEGATIVE_CACHE_TTL_MINUTES:${KKREPO_MAVEN_PROXY_NEGATIVE_CACHE_TTL_MINUTES:5}}
kkrepo.proxy.remote-http-version=${KKREPO_PROXY_REMOTE_HTTP_VERSION:HTTP_1_1}
kkrepo.proxy.search-timeout-seconds=${KKREPO_PROXY_SEARCH_TIMEOUT_SECONDS:${KKREPO_NPM_PROXY_SEARCH_TIMEOUT_SECONDS:30}}
kkrepo.proxy.metadata-timeout-seconds=${KKREPO_PROXY_METADATA_TIMEOUT_SECONDS:${KKREPO_MAVEN_PROXY_GET_TIMEOUT_SECONDS:60}}
kkrepo.proxy.content-timeout-seconds=${KKREPO_PROXY_CONTENT_TIMEOUT_SECONDS:${KKREPO_PROXY_GET_TIMEOUT_SECONDS:${KKREPO_MAVEN_PROXY_GET_TIMEOUT_SECONDS:120}}}
kkrepo.proxy.head-timeout-seconds=${KKREPO_PROXY_HEAD_TIMEOUT_SECONDS:${KKREPO_MAVEN_PROXY_HEAD_TIMEOUT_SECONDS:5}}
kkrepo.proxy.body-read-retry-attempts=${KKREPO_PROXY_BODY_READ_RETRY_ATTEMPTS:${KKREPO_MAVEN_PROXY_BODY_READ_RETRY_ATTEMPTS:1}}

kkrepo.security.anonymous-read-enabled=false
kkrepo.security.token-header=X-Nexus-Plus-Token
# Secrets for reversible encryption of credentials/tokens at rest. Required outside the
# dev/test profiles (enforced by EncryptionSecretsVerifier); set strong, stable values.
# credential-secret covers blob-store S3 keys and auth-realm secrets (OIDC clientSecret,
# LDAP bind passwords); api-key-payload-secret covers user-facing API-key tokens.
kkrepo.security.encryption.credential-secret=${KKREPO_CREDENTIAL_SECRET:}
kkrepo.security.encryption.api-key-payload-secret=${KKREPO_API_KEY_PAYLOAD_SECRET:}
kkrepo.security.default-authenticated-role-id=${KKREPO_DEFAULT_AUTHENTICATED_ROLE_ID:nx-anonymous}
kkrepo.security.authorization-cache.enabled=${KKREPO_SECURITY_AUTHORIZATION_CACHE_ENABLED:true}
kkrepo.security.authorization-cache.ttl-minutes=${KKREPO_SECURITY_AUTHORIZATION_CACHE_TTL_MINUTES:10}
kkrepo.security.authorization-cache.version-local-ttl-seconds=${KKREPO_SECURITY_AUTHORIZATION_CACHE_VERSION_LOCAL_TTL_SECONDS:2}
# Node-local immutable catalog snapshots such as security grants/privileges/repository targets and
# blob_store metadata. Mutations refresh the editing node after commit and bump a MySQL version
# watermark so sibling replicas reload on the next poll; the scheduled MySQL sync is the safety net
# for missed changes or external database writes.
kkrepo.catalog-cache.enabled=${KKREPO_CATALOG_CACHE_ENABLED:true}
kkrepo.catalog-cache.refresh-interval-ms=${KKREPO_CATALOG_CACHE_REFRESH_INTERVAL_MS:60000}
kkrepo.catalog-cache.initial-delay-ms=${KKREPO_CATALOG_CACHE_INITIAL_DELAY_MS:60000}
# Supported values: mysql, none.
kkrepo.catalog-cache.broadcast-backend=${KKREPO_CATALOG_CACHE_BROADCAST_BACKEND:mysql}
kkrepo.catalog-cache.mysql.poll-delay-ms=${KKREPO_CATALOG_CACHE_MYSQL_POLL_DELAY_MS:500}
kkrepo.catalog-cache.mysql.initial-delay-ms=${KKREPO_CATALOG_CACHE_MYSQL_INITIAL_DELAY_MS:500}
kkrepo.catalog-cache.mysql.initial-jitter-ms=${KKREPO_CATALOG_CACHE_MYSQL_INITIAL_JITTER_MS:100}
kkrepo.security.hsts-enabled=${KKREPO_HSTS_ENABLED:false}
kkrepo.security.external-base-url=${KKREPO_EXTERNAL_BASE_URL:}
kkrepo.security.csrf.cookie-secure=${KKREPO_CSRF_COOKIE_SECURE:false}
kkrepo.security.outbound.allow-private-addresses=${KKREPO_OUTBOUND_ALLOW_PRIVATE_ADDRESSES:false}
kkrepo.security.outbound.allowed-hosts=${KKREPO_OUTBOUND_ALLOWED_HOSTS:}
kkrepo.security.forwarded-headers.trusted-proxies=${KKREPO_TRUSTED_PROXIES:}
kkrepo.security.rate-limit.login-per-minute=${KKREPO_LOGIN_RATE_LIMIT_PER_MINUTE:20}
kkrepo.security.rate-limit.bootstrap-per-minute=${KKREPO_BOOTSTRAP_RATE_LIMIT_PER_MINUTE:5}
kkrepo.security.authentication-ticket-ttl-seconds=${KKREPO_AUTHENTICATION_TICKET_TTL_SECONDS:300}
kkrepo.security.authentication-ticket-cleanup-interval-ms=${KKREPO_AUTHENTICATION_TICKET_CLEANUP_INTERVAL_MS:60000}
kkrepo.security.authentication-ticket-cleanup-initial-delay-ms=${KKREPO_AUTHENTICATION_TICKET_CLEANUP_INITIAL_DELAY_MS:60000}
kkrepo.security.upload.max-request-bytes=${KKREPO_UPLOAD_MAX_REQUEST_BYTES:1073741824}

# Tier-1 tuning: wide connection pool for metadata-heavy artifact traffic (many concurrent
# small GETs). Portable across all S3-compatible stores (AWS S3, MinIO, OSS, COS, OBS).
kkrepo.storage.s3.max-connections=${KKREPO_S3_MAX_CONNECTIONS:512}
kkrepo.storage.s3.connection-timeout-ms=${KKREPO_S3_CONNECTION_TIMEOUT_MS:5000}
kkrepo.storage.s3.socket-timeout-ms=${KKREPO_S3_SOCKET_TIMEOUT_MS:120000}
kkrepo.storage.s3.connection-acquisition-timeout-ms=${KKREPO_S3_CONNECTION_ACQUISITION_TIMEOUT_MS:10000}
kkrepo.storage.s3.tcp-keep-alive=${KKREPO_S3_TCP_KEEP_ALIVE:true}
kkrepo.storage.s3.multipart-threshold-bytes=${KKREPO_S3_MULTIPART_THRESHOLD_BYTES:67108864}
kkrepo.storage.s3.multipart-part-size-bytes=${KKREPO_S3_MULTIPART_PART_SIZE_BYTES:16777216}
kkrepo.storage.s3.multipart-concurrency=${KKREPO_S3_MULTIPART_CONCURRENCY:4}
kkrepo.blob.transfer-buffer-size-bytes=${KKREPO_BLOB_TRANSFER_BUFFER_SIZE_BYTES:1048576}
kkrepo.storage.file.enabled=${KKREPO_FILE_ENABLED:true}
kkrepo.storage.file.base-dir=${KKREPO_FILE_BASE_DIR:blobs}
# File blob stores are valid in distributed deployments only when every replica mounts the
# same strong-consistency shared filesystem (for example NAS). In prod/production profile,
# both flags below must be true before admins can create or update file blob stores.
kkrepo.storage.file.production-enabled=${KKREPO_FILE_PRODUCTION_ENABLED:false}
kkrepo.storage.file.shared-filesystem=${KKREPO_FILE_SHARED_FILESYSTEM:false}
kkrepo.storage.file.temp-cleanup-enabled=${KKREPO_FILE_TEMP_CLEANUP_ENABLED:true}
kkrepo.storage.file.temp-cleanup-interval-ms=${KKREPO_FILE_TEMP_CLEANUP_INTERVAL_MS:300000}
kkrepo.storage.file.temp-cleanup-grace-seconds=${KKREPO_FILE_TEMP_CLEANUP_GRACE_SECONDS:86400}

kkrepo.repository-index-rebuild.enabled=${KKREPO_REPOSITORY_INDEX_REBUILD_ENABLED:true}
kkrepo.repository-index-rebuild.poll-interval-ms=${KKREPO_REPOSITORY_INDEX_REBUILD_POLL_INTERVAL_MS:1000}
kkrepo.repository-index-rebuild.batch-size=${KKREPO_REPOSITORY_INDEX_REBUILD_BATCH_SIZE:16}
kkrepo.pypi.index.sync-wait-ms=${KKREPO_PYPI_INDEX_SYNC_WAIT_MS:0}
kkrepo.maven.runtime-cache-ttl-seconds=${KKREPO_MAVEN_RUNTIME_CACHE_TTL_SECONDS:30}
kkrepo.blob-gc.enabled=${KKREPO_BLOB_GC_ENABLED:true}
kkrepo.blob-gc.poll-interval-ms=${KKREPO_BLOB_GC_POLL_INTERVAL_MS:30000}
kkrepo.blob-gc.batch-size=${KKREPO_BLOB_GC_BATCH_SIZE:64}
kkrepo.blob-gc.reconcile-scan-batch-size=${KKREPO_BLOB_GC_RECONCILE_SCAN_BATCH_SIZE:1024}
kkrepo.blob-gc.reconcile-mark-batch-size=${KKREPO_BLOB_GC_RECONCILE_MARK_BATCH_SIZE:${KKREPO_BLOB_GC_RECONCILE_BATCH_SIZE:256}}
kkrepo.blob-gc.deleted-grace-seconds=${KKREPO_BLOB_GC_DELETED_GRACE_SECONDS:3600}
kkrepo.blob-gc.claim-retry-seconds=${KKREPO_BLOB_GC_CLAIM_RETRY_SECONDS:600}
